image: node:20

default:
  tags:
    - us

stages:
  - verify
  - build
  - sync
  - publish

variables:
  NPM_REGISTRY: "https://registry.npmjs.org/"
  NPM_DIST_TAG: "latest"
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG'

install:
  stage: verify
  script:
    - node --version
    - npm --version
    - npm ci --prefer-offline
    - npm run typecheck
    - npm test

build:
  stage: build
  needs:
    - install
  script:
    - npm ci --prefer-offline
    - npm run build
    - npm pack --dry-run
  artifacts:
    expire_in: 1 week
    paths:
      - dist/

sync_github:
  stage: sync
  image:
    name: alpine/git:latest
    entrypoint: [""]
  needs:
    - build
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - when: never
  script:
    - |
      if [ -z "${GITHUB_TOKEN:-}" ]; then
        echo "Missing GitLab CI/CD variable: GITHUB_TOKEN"
        exit 1
      fi
    - |
      if [ -z "${GITHUB_REPOSITORY:-}" ]; then
        echo "Missing GitLab CI/CD variable: GITHUB_REPOSITORY"
        exit 1
      fi
    - git config --global --add safe.directory "${CI_PROJECT_DIR}"
    - git remote remove github 2>/dev/null || true
    - git remote add github "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
    - git push github "HEAD:main"

publish:
  stage: publish
  needs:
    - build
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
      allow_failure: false
    - when: never
  script:
    - npm ci --prefer-offline
    - npm run build
    - npm pack --dry-run
    - PACKAGE_NAME="$(node -p "require('./package.json').name")"
    - PACKAGE_VERSION="$(node -p "require('./package.json').version")"
    - PACKAGE_SPEC="${PACKAGE_NAME}@${PACKAGE_VERSION}"
    - |
      if npm view "${PACKAGE_SPEC}" version --registry "${NPM_REGISTRY}" >/dev/null 2>&1; then
        echo "${PACKAGE_SPEC} already exists on npm. Skip publish."
        exit 0
      fi
    - |
      if [ -z "${NPM_TOKEN:-}" ]; then
        echo "Missing GitLab CI/CD variable: NPM_TOKEN"
        exit 1
      fi
    - printf "%s\n" "registry=${NPM_REGISTRY}" "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
    - npm whoami --registry "${NPM_REGISTRY}"
    - |
      if [ -n "${NPM_OTP:-}" ]; then
        npm publish --access public --tag "${NPM_DIST_TAG}" --registry "${NPM_REGISTRY}" --otp "${NPM_OTP}"
      else
        npm publish --access public --tag "${NPM_DIST_TAG}" --registry "${NPM_REGISTRY}"
      fi
  after_script:
    - rm -f .npmrc ./*.tgz
